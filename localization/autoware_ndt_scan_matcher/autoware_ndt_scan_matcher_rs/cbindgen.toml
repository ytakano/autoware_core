# cbindgen config — generates include/autoware_ndt_scan_matcher_rs.h from this crate's `#[repr(C)]`
# types + `extern "C"` fns, so the C header is a single-source build artifact (no hand-syncing the
# C++ side against the Rust FFI). Run by CMake via Corrosion's corrosion_experimental_cbindgen.

language = "C"
include_guard = "AUTOWARE_NDT_SCAN_MATCHER_RS_H_"
# Emit `size_t` for Rust `usize` (matches the prior hand-written header + the C++ call sites).
usize_is_size_t = true
# Emit the `#ifdef __cplusplus extern "C" {` wrapper (the header is consumed by C++).
cpp_compat = true
# Carry the Rust `///` docs into the header as `//` comments.
documentation = true
documentation_style = "c99"
# Only these system includes (the FFI uses bool / size_t / fixed-width ints).
sys_includes = ["stdbool.h", "stddef.h", "stdint.h"]
no_includes = true

header = """
// Copyright 2024 Autoware Foundation
//
// Licensed under the Apache License, Version 2.0 (the "License");
// you may not use this file except in compliance with the License.
// You may obtain a copy of the License at
//
//     http://www.apache.org/licenses/LICENSE-2.0
//
// Unless required by applicable law or agreed to in writing, software
// distributed under the License is distributed on an "AS IS" BASIS,
// WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
// See the License for the specific language governing permissions and
// limitations under the License."""

autogen_warning = "// C ABI exported by the `autoware_ndt_scan_matcher_rs` Rust crate. GENERATED by cbindgen — DO NOT EDIT; edit the Rust `#[repr(C)]` structs / `extern \"C\"` fns and rebuild."

[export.rename]
# The opaque handles + vtables whose Rust names lack the `Aw` prefix the C++ side uses. Every other
# FFI struct is already named `Aw*` in Rust and needs no rename.
"NdtEngine" = "AwNdtEngine"
"VoxelGrid" = "AwNdtVoxelGrid"
"VoxelGridMap" = "AwNdtVoxelGridMap"
"NdtHost" = "AwNdtHost"
"Diagnostics" = "AwDiagnostics"
"NdtScanMatcherRs" = "AwNdtScanMatcher"

[parse]
# The `extern "C"` fns all live in THIS (node) crate, but their signatures reference the opaque
# handle/POD types that now live in the pure-Rust engine crate `autoware_ndt_rs` (a path dependency):
# `NdtEngine`/`VoxelGrid`/`VoxelGridMap` (renamed below) plus the `Aw*` engine structs. So cbindgen
# must parse that dependency to resolve and emit those types (and apply the renames). The `include`
# whitelist keeps it from also walking nalgebra/libm/etc. — only this crate + the engine crate.
parse_deps = true
include = ["autoware_ndt_rs"]
