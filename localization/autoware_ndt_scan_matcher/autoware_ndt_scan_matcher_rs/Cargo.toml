[package]
name = "autoware_ndt_scan_matcher_rs"
version = "0.1.0"
edition = "2024"

[lib]
# staticlib: linked into the C++ ament library over FFI.
# rlib: keeps `cargo test` (and Rust-side consumers) working.
crate-type = ["staticlib", "rlib"]

[features]
# `std` is default-on so a plain `cargo build`/`test`/`clippy` has std (test harness + panic
# handler). The no_std / awkernel build opts out with `--no-default-features`.
default = ["std"]
std = []
# `ros`: build the ROS-message bindings (bindgen over the rosidl C headers) and the Pose-pointer
# FFI shims. Enabled only for the ROS-node build (CMake NDT_USE_RUST=ON); implies `std` (the node
# links into the std C++ world). Stays OFF for awkernel, which has no ROS headers or libclang.
ros = ["dep:bindgen", "std"]

[dependencies]
# Pure-Rust libm: provides sqrt in no_std (and matches C++ std::sqrt — sqrt is IEEE
# correctly-rounded — so the differential oracle stays exact).
libm = "0.2"

[build-dependencies]
bindgen = { version = "0.69", optional = true }

# rust-hardening gates (see .claude/skills/rust-hardening).
[lints.rust]
warnings = "deny"
unsafe_code = "deny"
unsafe_op_in_unsafe_fn = "deny"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
unreachable = "deny"
todo = "deny"
unimplemented = "deny"
indexing_slicing = "deny"
string_slice = "deny"
unwrap_in_result = "deny"
arithmetic_side_effects = "deny"
let_underscore_must_use = "deny"
as_conversions = "deny"
cast_possible_truncation = "deny"
cast_possible_wrap = "deny"
cast_sign_loss = "deny"
cast_lossless = "warn"
float_cmp = "deny"
lossy_float_literal = "deny"
pedantic = { level = "warn", priority = -1 }

[profile.release]
overflow-checks = true
