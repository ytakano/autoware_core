[package]
name = "autoware_ndt_scan_matcher_rs"
version = "0.1.0"
edition = "2024"

[lib]
# staticlib: linked into the C++ ament library over FFI.
# rlib: keeps `cargo test` (and Rust-side consumers) working.
crate-type = ["staticlib", "rlib"]

[dependencies]

# rust-hardening gates (see .claude/skills/rust-hardening).
[lints.rust]
warnings = "deny"
unsafe_code = "deny"
unsafe_op_in_unsafe_fn = "deny"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
unreachable = "deny"
todo = "deny"
unimplemented = "deny"
indexing_slicing = "deny"
string_slice = "deny"
unwrap_in_result = "deny"
arithmetic_side_effects = "deny"
let_underscore_must_use = "deny"
as_conversions = "deny"
cast_possible_truncation = "deny"
cast_possible_wrap = "deny"
cast_sign_loss = "deny"
cast_lossless = "warn"
float_cmp = "deny"
lossy_float_literal = "deny"
pedantic = { level = "warn", priority = -1 }

[profile.release]
overflow-checks = true
